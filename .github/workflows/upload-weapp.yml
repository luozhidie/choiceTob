name: Upload WeChat Mini Program

on:
  push:
    branches: [main]
    paths:
      - 'miniprogram/src/**'
      - 'miniprogram/config/**'
      - 'miniprogram/package.json'
      - 'miniprogram/upload.js'

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./miniprogram
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm install 2>&1

      - name: Build Taro weapp
        id: build
        run: |
          set -e
          echo "=========================================="
          echo "PWD=$(pwd)"
          echo "Node=$(node -v)"
          echo "Npm=$(npm -v)"
          echo "=========================================="
          npm run build:weapp 2>&1 || true
          echo ""
          echo "=========================================="
          echo "BUILD RESULT:"
          echo "=========================================="
          echo "All dirs:"
          ls -la .
          echo "---"
          echo "Looking for dist/weapp/output:"
          find . -maxdepth 2 -type d 2>/dev/null
          echo "---"
          echo "app.json locations:"
          find . -name "app.json" 2>/dev/null
          echo "=========================================="

      - name: Upload to WeChat
        env:
          WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
          WECHAT_KEY: ${{ secrets.WECHAT_UPLOAD_KEY }}
        run: |
          set -e
          
          npm i miniprogram-ci@latest --silent 2>/dev/null || true
          
          echo "$WECHAT_KEY" > ./private.key && chmod 600 ./private.key
          
          # 找到真正的编译输出目录
          DIST="./dist"
          for d in ./dist ./weapp ./output; do
            if [ -f "$d/app.json" ]; then
              DIST="$d"
              break
            fi
          done
          
          if [ ! -f "$DIST/app.json" ]; then
            echo "❌ 编译输出不存在！无法上传。"
            exit 1
          fi
          
          echo "✅ 使用编译输出: $DIST"
          node upload.js "$DIST"
