name: Upload WeChat Mini Program

on:
  push:
    branches: [main]
    paths:
      - 'miniprogram/src/**'
      - 'miniprogram/config/**'
      - 'miniprogram/package.json'

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./miniprogram
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install 2>&1 | tail -3

      - name: Build
        run: npx taro build --type weapp 2>&1 | tail -10

      - name: Verify dist
        run: |
          echo "=== Checking dist ==="
          test -f ./dist/app.json && echo "✅ app.json found" || echo "❌ no app.json"
          ls ./dist/ | head -10
          test -d ./dist || { echo "❌ NO DIST"; exit 1; }

      - name: Install ci
        run: npm i miniprogram-ci@latest --save-dev 2>&1 | tail -3

      - name: Write key
        run: printf '%s' "$WECHAT_KEY" > ./private.key && chmod 600 ./private.key
        env:
          WECHAT_KEY: ${{ secrets.WECHAT_UPLOAD_KEY }}

      - name: Upload
        run: |
          npx miniprogram-ci upload \
            --pp ./dist \
            --pkp ./private.key \
            --appid $WECHAT_APPID \
            -r 1 \
            -v $(date +%Y.%m.%d) \
            --desc "auto-deploy"
        env:
          WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
