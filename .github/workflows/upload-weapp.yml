name: Upload WeChat Mini Program

on:
  push:
    branches: [main]
    paths:
      - 'miniprogram/src/**'
      - 'miniprogram/config/**'
      - 'miniprogram/package.json'

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./miniprogram
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Taro Mini Program
        run: npx taro build --type weapp

      - name: Install miniprogram-ci
        run: npm install miniprogram-ci --save-dev

      - name: Prepare upload script
        run: |
          printf '%s\n' "${{ secrets.WECHAT_UPLOAD_KEY }}" > private_upload_key
          chmod 600 private_upload_key
          echo "Key file size: $(wc -c < private_upload_key) bytes"
          echo "Key first line: $(head -1 private_upload_key)"
          ls -la dist/ | head -5

      - name: Upload to WeChat
        env:
          WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
        run: |
          node -e "
            const ci = require('miniprogram-ci');
            const fs = require('fs');
            console.log('APPID:', process.env.WECHAT_APPID);
            console.log('KEY exists:', fs.existsSync('./private_upload_key'));
            console.log('DIST exists:', fs.existsSync('./dist'));

            const project = new ci.Project({
              appid: process.env.WECHAT_APPID,
              type: 'miniProgram',
              projectPath: './dist',
              ignoreDevFiles: true,
              privateKeyPath: './private_upload_key',
            });

            ci.upload({
              project,
              version: process.env.GITHUB_RUN_NUMBER || '1.0.1',
              desc: '自动部署 v' + (process.env.GITHUB_RUN_NUMBER || '1'),
              setting: {
                es6: true,
                es7: true,
                enhance: true,
                compileHotReLoad: false,
                autoAudits: false,
              },
              robot: 1,
            }).then(() => {
              console.log('✅ 上传成功!');
            }).catch(e => {
              console.error('❌ 上传失败:', JSON.stringify(e));
              process.exit(1);
            });
          "
