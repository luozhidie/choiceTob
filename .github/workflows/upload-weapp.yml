name: Upload WeChat Mini Program (Native)

on:
  push:
    branches: [main]
    paths:
      - 'miniprogram-native/**'
      - '.github/workflows/upload-weapp.yml'
  workflow_dispatch:

jobs:
  upload-native:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install miniprogram-ci
        run: |
          cd "$GITHUB_WORKSPACE"
          npm install miniprogram-ci --save-dev 2>&1

      - name: Prepare dist from native code
        run: |
          set -e
          rm -rf ./dist-upload
          mkdir -p ./dist-upload
          cp -r ./miniprogram-native/* ./dist-upload/
          cp -r ./miniprogram-native/.??* ./dist-upload/ 2>/dev/null || true
          echo "dist files:"
          find ./dist-upload -type f | head -30

      - name: Upload to WeChat
        env:
          WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
          WECHAT_KEY: ${{ secrets.WECHAT_UPLOAD_KEY }}
        run: |
          set -e
          cat > upload-native.js << 'UPLOADSCRIPT'
          const ci = require('./node_modules/miniprogram-ci');
          const fs = require('fs');
          const path = require('path');

          var appid = process.env.WECHAT_APPID || '';
          var keyPath = './private.key';
          var distPath = './dist-upload';

          console.log('Upload start...');
          console.log('appid:', appid ? 'OK' : 'MISSING');
          console.log('key:', fs.existsSync(keyPath) ? 'OK' : 'MISSING');
          console.log('dist:', fs.existsSync(distPath) ? 'OK' : 'MISSING');
          console.log('app.json exists:', fs.existsSync(distPath + '/app.json') ? 'YES' : 'NO');

          if (!fs.existsSync(keyPath)) {
            console.error('ERROR: private.key missing');
            process.exit(1);
          }
          if (!fs.existsSync(distPath + '/app.json')) {
            console.error('ERROR: app.json missing in dist');
            process.exit(1);
          }

          var project = new ci.Project({
            appid: appid,
            type: 'miniProgram',
            projectPath: path.resolve(distPath),
            privateKeyPath: path.resolve(keyPath)
          });

          ci.upload({
            project: project,
            version: String(process.env.GITHUB_RUN_NUMBER || '1'),
            desc: 'native v' + (process.env.GITHUB_RUN_NUMBER || '1') + ' auto upload',
            setting: { es6: true, es7: true, enhance: true, minify: false },
            robot: 1
          }).then(function() {
            console.log('=== UPLOAD SUCCESS ===');
          }).catch(function(e) {
            console.error('=== UPLOAD FAIL ===', e.message || e);
            process.exit(1);
          });
          UPLOADSCRIPT

          echo "$WECHAT_KEY" > ./private.key && chmod 600 ./private.key
          node upload-native.js

      - name: Set Experience Version (auto 设为体验版)
        env:
          WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
          WECHAT_APPSECRET: ${{ secrets.WECHAT_APPSECRET }}
        run: |
          set -e
          if [ -z "$WECHAT_APPSECRET" ]; then
            echo "⚠️ WECHAT_APPSECRET 未配置，跳过自动设为体验版。"
            echo "   请在 GitHub 仓库 Settings → Secrets and variables → Actions 添加名为 WECHAT_APPSECRET 的密钥（值=小程序 AppSecret）。"
            exit 0
          fi
          echo "获取 access_token ..."
          TOKEN=$(curl -s "https://api.weixin.qq.com/cgi-bin/token?grant_type=client_credential&appid=$WECHAT_APPID&secret=$WECHAT_APPSECRET" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('access_token',''))")
          if [ -z "$TOKEN" ]; then
            echo "❌ 获取 access_token 失败（检查 WECHAT_APPID / WECHAT_APPSECRET 是否正确）"
            exit 0
          fi
          VER="${{ github.run_number }}"
          echo "调用 set_experience_version，version=$VER ..."
          RESP=$(curl -s -X POST "https://api.weixin.qq.com/wxa/set_experience_version?access_token=$TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"experience_version\":\"$VER\"}")
          echo "微信返回: $RESP"
          echo "=== 设为体验版尝试完成 ==="
