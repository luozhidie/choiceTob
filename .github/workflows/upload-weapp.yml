name: Upload WeChat Mini Program

on:
  push:
    branches: [main]
    paths:
      - 'miniprogram/src/**'
      - 'miniprogram/config/**'
      - 'miniprogram/package.json'
      - 'miniprogram/upload.js'

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./miniprogram
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build
        run: |
          npm install 2>&1 | tail -3
          npx taro build --type weapp 2>&1

      - name: Install ci & Upload
        env:
          WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
          WECHAT_KEY: ${{ secrets.WECHAT_UPLOAD_KEY }}
        run: |
          npm i miniprogram-ci@latest 2>&1 | tail -2
          echo "$WECHAT_KEY" > ./private.key && chmod 600 ./private.key
          node upload.js
