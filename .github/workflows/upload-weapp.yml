name: Upload WeChat Mini Program

on:
  push:
    branches: [main]
    paths:
      - 'miniprogram/src/**'
      - 'miniprogram/config/**'
      - 'miniprogram/package.json'

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./miniprogram
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Taro Mini Program
        run: npx taro build --type weapp

      - name: Install miniprogram-ci
        run: npm install miniprogram-ci --save-dev

      - name: Upload to WeChat (with debug)
        env:
          WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
          WECHAT_KEY: ${{ secrets.WECHAT_UPLOAD_KEY }}
        run: |
          python3 -c "
          import os
          key = os.environ.get('WECHAT_KEY','')
          with open('./private.key','w') as f:
              f.write(key)
          os.chmod('./private.key',0o600)
          
          print('=== DEBUG ===')
          print(f'APPID={os.environ.get(\"WECHAT_APPID\",\"MISSING\")}')
          print(f'Key len={len(key)} bytes')
          print(f'Key starts with: {key[:30]}')
          print(f'Key ends with: {key[-20:]}')
          import os.path
          print(f'Dist exists={os.path.isdir(\"./dist\")}')
          if os.path.isdir('./dist'):
              items = os.listdir('./dist')[:5]
              print(f'Dist files: {items}')
          print('==========')
          "

          node -e '
          const ci = require("miniprogram-ci");
          const project = new ci.Project({
            appid: process.env.WECHAT_APPID,
            type: "miniProgram",
            projectPath: "./dist",
            ignoreDevFiles: true,
            privateKeyPath: "./private.key"
          });
          ci.upload({
            project,
            version: process.env.GITHUB_RUN_NUMBER || "1.0.2",
            desc: "auto v" + (process.env.GITHUB_RUN_NUMBER || "2"),
            setting: { es6:true, es7:true, enhance:true, compileHotReLoad:false, autoAudits:false },
            robot: 1
          }).then(() => console.log("✅ 上传成功!"))
          .catch(e => {
            console.error("❌ 失败:", e.message || JSON.stringify(e));
            if(e.errMsg) console.error("详情:", e.errMsg);
            process.exit(1);
          });
          '
