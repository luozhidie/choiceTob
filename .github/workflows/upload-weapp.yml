name: Upload WeChat Mini Program

on:
  push:
    branches: [main]
    paths:
      - 'miniprogram/src/**'
      - 'miniprogram/config/**'
      - 'miniprogram/package.json'

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./miniprogram
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Taro Mini Program
        run: npx taro build --type weapp

      - name: Install miniprogram-ci
        run: npm install miniprogram-ci --save-dev

      - name: Upload to WeChat
        env:
          WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
          WECHAT_KEY: ${{ secrets.WECHAT_UPLOAD_KEY }}
        run: |
          # 写入私钥文件（双引号heredoc展开变量）
          printf '%s' "$WECHAT_KEY" > ./private.key
          chmod 600 ./private.key
          
          # 调试信息
          echo "=== DEBUG ==="
          echo "APPID=$WECHAT_APPID"
          echo "Key lines=$(wc -l < ./private.key) size=$(wc -c < ./private.key)"
          test -d ./dist && echo "Dist=OK" || echo "Dist=MISSING"
          ls ./dist/ 2>/dev/null | head -5
          head -1 ./private.key
          tail -1 ./private.key
          echo "=========="

          node << 'NODEOF'
          const ci = require("miniprogram-ci");
          const project = new ci.Project({
            appid: process.env.WECHAT_APPID,
            type: "miniProgram",
            projectPath: "./dist",
            ignoreDevFiles: true,
            privateKeyPath: "./private.key"
          });
          ci.upload({
            project,
            version: process.env.GITHUB_RUN_NUMBER || "1.0.2",
            desc: "auto v" + (process.env.GITHUB_RUN_NUMBER || "2"),
            setting: { es6:true, es7:true, enhance:true, compileHotReLoad:false, autoAudits:false },
            robot: 1
          }).then(() => console.log("✅ OK"))
            .catch(e => {
              console.error("❌ FAIL:", JSON.stringify({msg:e.message, code:e.errCode||e.code, detail:e.errMsg}));
              process.exit(1);
            });
          NODEOF
