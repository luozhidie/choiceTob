name: Upload WeChat Mini Program

on:
  push:
    branches: [main]
    paths:
      - 'miniprogram/src/**'
      - 'miniprogram/config/**'
      - 'miniprogram/package.json'
      - 'miniprogram/upload.js'

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./miniprogram
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm install 2>&1

      - name: Install miniprogram-ci
        run: npm install miniprogram-ci --save-dev 2>&1 || true

      - name: Build Taro weapp
        id: build
        run: |
          set -e
          npm run build:weapp 2>&1 || true
          echo "BUILD_DONE"

      - name: Overwrite ALL pages with native code
        run: |
          set -e
          node upload.js

      - name: Upload to WeChat
        env:
          WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
          WECHAT_KEY: ${{ secrets.WECHAT_UPLOAD_KEY }}
        run: |
          echo "$WECHAT_KEY" > ./private.key && chmod 600 ./private.key
          node upload.js ./dist
